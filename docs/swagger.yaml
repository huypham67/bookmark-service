definitions:
  gin.H:
    additionalProperties: {}
    type: object
  github_com_huypham67_bookmark-service_internal_dto_request.LoginRequest:
    properties:
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_huypham67_bookmark-service_internal_dto_request.RegisterUserRequest:
    properties:
      display_name:
        maxLength: 100
        minLength: 2
        type: string
      email:
        type: string
      password:
        minLength: 8
        type: string
      username:
        maxLength: 50
        minLength: 3
        type: string
    required:
    - display_name
    - email
    - password
    - username
    type: object
  github_com_huypham67_bookmark-service_internal_dto_request.ShortenURLRequest:
    properties:
      exp:
        maximum: 86400
        minimum: 0
        type: integer
      url:
        maxLength: 2048
        type: string
    required:
    - url
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.HealthCheckResponse:
    properties:
      instance_id:
        type: string
      message:
        type: string
      service_name:
        type: string
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.LoginResponse:
    properties:
      data:
        type: string
      message:
        type: string
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.RegisterUserResponse:
    properties:
      data:
        $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.UserData'
      message:
        type: string
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.ShortenURLResponse:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.UserData:
    properties:
      created_at:
        type: string
      display_name:
        type: string
      email:
        type: string
      id:
        type: string
      username:
        type: string
    type: object
  github_com_huypham67_bookmark-service_internal_dto_response.UserResponse:
    properties:
      data: {}
      message:
        type: string
    type: object
info:
  contact: {}
  description: This is the API documentation for the Bookmark Service
  title: Bookmark Service API
  version: "1.1"
paths:
  /health-check:
    get:
      consumes:
      - application/json
      description: Check application health status and Redis connection
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.HealthCheckResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.HealthCheckResponse'
      summary: Health Check
      tags:
      - health
  /v1/links/redirect/{code}:
    get:
      consumes:
      - application/json
      description: Redirect user to the original URL based on the shortened code
      parameters:
      - description: Shortened code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "301":
          description: Redirect successful
        "404":
          description: Short link not found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Redirect to Original URL
      tags:
      - links
  /v1/links/shorten:
    post:
      consumes:
      - application/json
      description: Create a shortened URL code and save it to Redis
      parameters:
      - description: URL to shorten
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_request.ShortenURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Shorten URL generated successfully
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.ShortenURLResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Shorten URL
      tags:
      - links
  /v1/self/info:
    get:
      consumes:
      - application/json
      description: Get authenticated user information from JWT token
      produces:
      - application/json
      responses:
        "200":
          description: User information
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gin.H'
      security:
      - Bearer: []
      summary: Get User Info
      tags:
      - users
  /v1/users/login:
    post:
      consumes:
      - application/json
      description: Login a user with username and password
      parameters:
      - description: User login data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_request.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User logged in successfully
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.LoginResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/gin.H'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Login User
      tags:
      - users
  /v1/users/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email, username, and password
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_request.RegisterUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            $ref: '#/definitions/github_com_huypham67_bookmark-service_internal_dto_response.RegisterUserResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/gin.H'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/gin.H'
      summary: Register User
      tags:
      - users
securityDefinitions:
  Bearer:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
