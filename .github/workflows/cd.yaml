name: cd-pipeline

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy Application
        working-directory: /opt/bookmark-system
        run: |
          set -e

          echo "TAG=${{ inputs.image_tag }}" > .env
          
          echo "::notice title=CD Status::🚀 Deploying with image tag: [${{ inputs.image_tag }}]"

          echo "Pulling image: bookmark-service:${{ inputs.image_tag }}..."
          docker compose pull bookmark-service

          echo "Recreating service..."
          docker compose up -d --force-recreate bookmark-service

          echo "Cleaning up unused images..."
          docker image prune -f --filter "until=24h"

          echo "✅ Deployment completed successfully"
